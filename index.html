<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Isometric Merge - Playable Ad</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a24;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>

<body>
    <script>
        const TILE_W = 140;
        const TILE_H = 70;
        const OFFSET_X = 300;
        const OFFSET_Y = 160;

        const config = {
            type: Phaser.AUTO,
            width: 600,
            height: 800,
            backgroundColor: '#1a1a24',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: { create: create }
        };

        new Phaser.Game(config);

        function getIsoPos(x, y) {
            return {
                x: (x - y) * (TILE_W / 2) + OFFSET_X,
                y: (x + y) * (TILE_H / 2) + OFFSET_Y
            };
        }

        function create() {
            this.grid = [];
            this.gameOver = false;
            this.gameStarted = false;
            this.bestValue = 2;
            const gridSize = 3;
            this.gridSize = gridSize;

            // --- Score UI ---
            const panelY = 460;
            // Левая карточка: ЛУЧШИЙ
            const leftBg = this.add.graphics();
            leftBg.fillStyle(0x000000, 0.35);
            leftBg.fillRoundedRect(90, panelY - 36, 160, 72, 16);
            leftBg.lineStyle(2, 0x5da8ff, 0.4);
            leftBg.strokeRoundedRect(90, panelY - 36, 160, 72, 16);
            this.add.text(170, panelY - 16, 'ЛУЧШИЙ', { fontSize: '13px', fontStyle: 'bold', color: '#5da8ff', letterSpacing: 2 }).setOrigin(0.5);
            this.bestText = this.add.text(170, panelY + 14, '2', { fontSize: '34px', fontStyle: 'bold', color: '#fff', shadow: { offsetX: 0, offsetY: 2, color: '#5da8ff', blur: 8, fill: true } }).setOrigin(0.5);
            // Правая карточка: ЦЕЛЬ 32
            const rightBg = this.add.graphics();
            rightBg.fillStyle(0x1a1000, 0.7);
            rightBg.fillRoundedRect(350, panelY - 36, 160, 72, 16);
            rightBg.lineStyle(2, 0xf9e44a, 0.7);
            rightBg.strokeRoundedRect(350, panelY - 36, 160, 72, 16);
            this.add.text(430, panelY - 16, 'ЦЕЛЬ', { fontSize: '13px', fontStyle: 'bold', color: '#f9e44a', letterSpacing: 2 }).setOrigin(0.5);
            this.add.text(430, panelY + 14, '32', { fontSize: '34px', fontStyle: 'bold', color: '#f9e44a', shadow: { offsetX: 0, offsetY: 2, color: '#f9a500', blur: 10, fill: true } }).setOrigin(0.5);

            // 1. Отрисовка изометрической сетки (земля)
            for (let x = 0; x < gridSize; x++) {
                this.grid[x] = [];
                for (let y = 0; y < gridSize; y++) {
                    const pos = getIsoPos(x, y);

                    const tile = this.add.graphics();
                    tile.lineStyle(2, 0x3a3a4f, 1);
                    tile.fillStyle(0x2a2a35, 1);
                    tile.beginPath();
                    tile.moveTo(pos.x, pos.y - TILE_H / 2);
                    tile.lineTo(pos.x + TILE_W / 2, pos.y);
                    tile.lineTo(pos.x, pos.y + TILE_H / 2);
                    tile.lineTo(pos.x - TILE_W / 2, pos.y);
                    tile.closePath();
                    tile.fillPath();
                    tile.strokePath();

                    // Массив логики: кто сейчас стоит на этой клетке
                    this.grid[x][y] = { empty: true, item: null };
                }
            }

            // 2. Создание стартовых предметов
            spawnItem(this, 0, 0, 1); // Уровень 1
            spawnItem(this, 1, 1, 1); // Уровень 1
            spawnItem(this, 2, 0, 2); // Уровень 2

            // 3. Кнопка «Добавить здание»
            const btnW = 270, btnH = 72;
            const btnX = 300, btnY = 580;

            const btnBg = this.add.graphics();
            function drawBtn(pressed) {
                btnBg.clear();
                // Тень
                btnBg.fillStyle(0x000000, 0.3);
                btnBg.fillRoundedRect(btnX - btnW / 2 + 4, btnY - btnH / 2 + 6, btnW, btnH, 16);
                // Основной фон
                const topColor = pressed ? 0x3a80d2 : 0x5da8ff;
                btnBg.fillStyle(topColor, 1);
                btnBg.fillRoundedRect(btnX - btnW / 2, btnY - btnH / 2, btnW, btnH, 16);
                // Блик
                btnBg.fillStyle(0xffffff, pressed ? 0.05 : 0.15);
                btnBg.fillRoundedRect(btnX - btnW / 2 + 6, btnY - btnH / 2 + 4, btnW - 12, btnH / 2 - 4, 10);
            }
            drawBtn(false);

            // Тёмный оверлей для плавного затемнения при hover
            const btnOverlay = this.add.graphics().setDepth(9);
            btnOverlay.fillStyle(0x000000, 1);
            btnOverlay.fillRoundedRect(btnX - btnW / 2, btnY - btnH / 2, btnW, btnH, 16);
            btnOverlay.setAlpha(0);

            const btnText = this.add.text(btnX, btnY, '+ Добавить здание', {
                fontSize: '22px',
                fontStyle: 'bold',
                color: '#ffffff',
                stroke: '#1a5fa8',
                strokeThickness: 3,
                shadow: { offsetX: 0, offsetY: 2, color: '#000', blur: 4, fill: true }
            }).setOrigin(0.5).setDepth(10);

            // Невидимая интерактивная зона над кнопкой
            const btnZone = this.add.zone(btnX, btnY, btnW, btnH).setInteractive().setDepth(11);

            btnZone.on('pointerover', () => {
                this.tweens.add({ targets: btnOverlay, alpha: 0.18, duration: 150, ease: 'Power2' });
            });
            btnZone.on('pointerout', () => {
                drawBtn(false);
                this.tweens.add({ targets: btnOverlay, alpha: 0, duration: 150, ease: 'Power2' });
            });
            btnZone.on('pointerdown', () => { drawBtn(true); btnOverlay.setAlpha(0); });
            btnZone.on('pointerup', () => {
                if (this.gameOver) return;
                drawBtn(false);
                this.tweens.add({ targets: btnOverlay, alpha: 0.18, duration: 150, ease: 'Power2' });

                // Найти первую свободную клетку (обход по строкам)
                let placed = false;
                for (let x = 0; x < gridSize && !placed; x++) {
                    for (let y = 0; y < gridSize && !placed; y++) {
                        if (this.grid[x][y].empty) {
                            const newItem = spawnItem(this, x, y, 1);
                            // Анимация появления
                            newItem.setScale(0);
                            newItem.textObj.setScale(0);
                            this.tweens.add({
                                targets: [newItem, newItem.textObj],
                                scaleX: 1, scaleY: 1,
                                duration: 200, ease: 'Back.Out'
                            });
                            placed = true;
                            this.tweens.delayedCall(260, () => checkLose(this));
                        }
                    }
                }
                if (!placed) {
                    // Если сетка полная — потряхиваем кнопку
                    this.tweens.add({
                        targets: [btnBg, btnText],
                        x: '+=6', duration: 50, yoyo: true, repeat: 3, ease: 'Power1',
                        onComplete: () => { btnBg.x = 0; btnText.x = btnX; }
                    });
                }
            });

            // 4. Таймер: поражение при истечении (7 секунд)
            const SPAWN_DELAY = 7000;
            const barX = 50, barY = 660, barW = 500, barH = 16;

            // Фон полосы
            const barBg = this.add.graphics();
            barBg.fillStyle(0x2a2a35, 1);
            barBg.fillRoundedRect(barX, barY, barW, barH, 8);
            this.add.text(300, barY - 24, 'Объедини здания до конца таймера!', {
                fontSize: '14px', color: '#aaaaaa', fontStyle: 'bold'
            }).setOrigin(0.5);

            // Заполняющаяся полоса (убывает справа налево)
            this.timerFill = this.add.graphics();
            this.timerElapsed = 0;

            // Сброс таймера после слияния
            this.startTimer = () => { this.timerElapsed = 0; };

            this.time.addEvent({
                delay: 50, loop: true,
                callbackScope: this,
                callback: function() {
                    if (!this.gameStarted || this.gameOver) return;
                    this.timerElapsed += 50;
                    const v = 1 - Math.min(this.timerElapsed / SPAWN_DELAY, 1); // убывает
                    this.timerFill.clear();
                    const color = v < 0.25 ? 0xe06c75 : (v < 0.55 ? 0xe5c07b : 0x98c379);
                    this.timerFill.fillStyle(color, 1);
                    this.timerFill.fillRoundedRect(barX, barY, barW * v, barH, 8);
                    if (this.timerElapsed >= SPAWN_DELAY) {
                        this.timerElapsed = 0;
                        showLose(this);
                    }
                }
            });

            // 5. TAP TO PLAY — экран правил
            const ov = this.add.graphics().setDepth(5000);
            ov.fillStyle(0x0d0d1a, 0.95);
            ov.fillRect(0, 0, 600, 800);

            this.add.text(300, 120, '🏗️', { fontSize: '72px' }).setOrigin(0.5).setDepth(5001);
            this.add.text(300, 210, 'ISOMETRIC MERGE', {
                fontSize: '32px', fontStyle: 'bold', color: '#f9e44a',
                stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5).setDepth(5001);

            const rules = [
                '↔  Перетаскивай одинаковые здания',
                '     чтобы объединить их',
                '⏱  Успей объединить до конца таймера',
                '🏆  Цель — собери здание 32',
                '➕  Кнопка добавляет новое здание'
            ];
            rules.forEach((line, i) => {
                this.add.text(300, 310 + i * 44, line, {
                    fontSize: '18px', color: '#cccccc', stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5).setDepth(5001);
            });

            // Кнопка START
            const startBg = this.add.graphics().setDepth(5001);
            startBg.fillStyle(0x5da8ff, 1);
            startBg.fillRoundedRect(150, 660, 300, 70, 20);
            startBg.fillStyle(0xffffff, 0.15);
            startBg.fillRoundedRect(156, 665, 288, 32, 14);
            this.add.text(300, 695, 'TAP TO PLAY', {
                fontSize: '26px', fontStyle: 'bold', color: '#fff',
                stroke: '#1a5fa8', strokeThickness: 3
            }).setOrigin(0.5).setDepth(5002);

            this.add.zone(300, 695, 300, 70).setInteractive().setDepth(5003)
                .on('pointerup', () => {
                    ov.destroy();
                    this.children.list
                        .filter(c => c.depth === 5001 || c.depth === 5002 || c.depth === 5003)
                        .forEach(c => c.destroy());
                    this.gameStarted = true;
                });

            // 5. Глобальный слушатель Drag & Drop
            this.input.on('dragstart', (pointer, gameObject) => {
                // Сразу центрируем объект по пальцу при касании
                gameObject.x = pointer.x;
                gameObject.y = pointer.y;
                gameObject.setDepth(1000);
            });

            this.input.on('drag', (pointer, gameObject) => {
                // Привязываем центр объекта строго к координатам пальца
                gameObject.x = pointer.x;
                gameObject.y = pointer.y;
            });

            this.input.on('dragend', (pointer, gameObject) => {
                if (!this.gameStarted || this.gameOver) { returnToOrigin(gameObject); return; }
                const relX = gameObject.x - OFFSET_X;
                const relY = gameObject.y - OFFSET_Y;

                let gridX = Math.round((relX / (TILE_W / 2) + relY / (TILE_H / 2)) / 2);
                let gridY = Math.round((relY / (TILE_H / 2) - relX / (TILE_W / 2)) / 2);

                if (gridX >= 0 && gridX < gridSize && gridY >= 0 && gridY < gridSize) {
                    const targetCell = this.grid[gridX][gridY];
                    if (targetCell.empty) {
                        moveItemTo(this, gameObject, gridX, gridY);
                    } else if (targetCell.item !== gameObject && targetCell.item.level === gameObject.level) {
                        mergeItems(this, gameObject, targetCell.item, gridX, gridY);
                        // Мерси даёт бонус: сбрасываем таймер и начинаем заново
                        if (!this.gameOver) this.startTimer();
                        if (!this.gameOver) this.tweens.delayedCall(300, () => checkLose(this));
                    } else {
                        returnToOrigin(gameObject);
                    }
                } else {
                    returnToOrigin(gameObject);
                }
            });
        }

        function spawnItem(scene, gridX, gridY, level) {
            const pos = getIsoPos(gridX, gridY);
            const palette = [0xe06c75, 0x98c379, 0x61afef, 0xe5c07b, 0xc678dd, 0x56b6c2, 0xff9f43, 0xee5a24, 0x0652DD, 0x1289A7];
            const color = palette[(level - 1) % palette.length];

            // Создаем "квадрат", который будет выступать предметом
            const item = scene.add.rectangle(pos.x, pos.y - 22, 62, 62, color).setInteractive({ draggable: true });
            item.gridX = gridX;
            item.gridY = gridY;
            item.level = level;

            // Сортировка глубины: чем больше X+Y, тем ближе к камере
            item.setDepth(gridX + gridY);

            // Текст значения (2^level)
            const value = Math.pow(2, level);
            item.textObj = scene.add.text(pos.x, pos.y - 22, value, {
                fontSize: value >= 1000 ? '16px' : '24px',
                fontStyle: 'bold',
                color: '#ffffff',
                stroke: '#000000',
                strokeThickness: 2
            }).setOrigin(0.5).setDepth(item.depth + 1);

            // Добавляем апдейт позиции для текста при перетаскивании
            item.on('drag', () => {
                item.textObj.x = item.x;
                item.textObj.y = item.y;
                item.textObj.setDepth(1001);
                item.setDepth(1000);
            });

            scene.grid[gridX][gridY] = { empty: false, item: item };
            return item;
        }

        function moveItemTo(scene, item, gridX, gridY) {
            scene.grid[item.gridX][item.gridY] = { empty: true, item: null }; // Освобождаем старую

            item.gridX = gridX;
            item.gridY = gridY;

            scene.grid[gridX][gridY] = { empty: false, item: item }; // Занимаем новую

            const pos = getIsoPos(gridX, gridY);
            item.setPosition(pos.x, pos.y - 22);
            item.textObj.setPosition(pos.x, pos.y - 22);

            item.setDepth(gridX + gridY);
            item.textObj.setDepth(gridX + gridY + 1);
        }

        function mergeItems(scene, sourceItem, targetItem, gridX, gridY) {
            const nextLevel = targetItem.level + 1;
            const mergeValue = Math.pow(2, nextLevel);

            // Уничтожаем старые объекты
            sourceItem.textObj.destroy();
            sourceItem.destroy();
            targetItem.textObj.destroy();
            targetItem.destroy();
            scene.grid[sourceItem.gridX][sourceItem.gridY] = { empty: true, item: null };

            // Создаем объект нового уровня
            const newItem = spawnItem(scene, gridX, gridY, nextLevel);

            // Анимация успешного слияния (Scale bounce)
            scene.tweens.add({
                targets: [newItem, newItem.textObj],
                scaleX: 1.3, scaleY: 1.3,
                duration: 150, yoyo: true
            });

            // Обновляем лучшее значение
            if (mergeValue > scene.bestValue) {
                scene.bestValue = mergeValue;
                scene.bestText.setText(mergeValue);
            }
            // Проверяем победу (32 = уровень 5)
            if (nextLevel === 5) { showWin(scene); return; }

            // Анимация +N
            const pos = getIsoPos(gridX, gridY);
            const plusText = scene.add.text(pos.x, pos.y - 55, '+' + mergeValue, {
                fontSize: '26px', fontStyle: 'bold', color: '#f9e44a',
                stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(2000);
            scene.tweens.add({
                targets: plusText,
                y: pos.y - 90, alpha: 0,
                duration: 900, ease: 'Power2',
                onComplete: () => plusText.destroy()
            });
        }

        function autoSpawn(scene) {
            if (scene.gameOver) return;
            const empty = [];
            for (let x = 0; x < scene.gridSize; x++)
                for (let y = 0; y < scene.gridSize; y++)
                    if (scene.grid[x][y].empty) empty.push({ x, y });
            if (empty.length === 0) { checkLose(scene); return; }
            const cell = Phaser.Math.RND.pick(empty);
            const newItem = spawnItem(scene, cell.x, cell.y, 1);
            newItem.setScale(0);
            newItem.textObj.setScale(0);
            scene.tweens.add({ targets: [newItem, newItem.textObj], scaleX: 1, scaleY: 1, duration: 200, ease: 'Back.Out' });
            scene.tweens.delayedCall(260, () => checkLose(scene));
        }

        function returnToOrigin(item) {
            const pos = getIsoPos(item.gridX, item.gridY);
            item.setPosition(pos.x, pos.y - 22);
            item.textObj.setPosition(pos.x, pos.y - 22);
            item.setDepth(item.gridX + item.gridY);
            item.textObj.setDepth(item.gridX + item.gridY + 1);
        }

        function checkLose(scene) {
            if (scene.gameOver) return;
            const gs = scene.gridSize;
            for (let x = 0; x < gs; x++)
                for (let y = 0; y < gs; y++)
                    if (scene.grid[x][y].empty) return;
            // Полная сетка — проверяем возможные слияния
            for (let x = 0; x < gs; x++) {
                for (let y = 0; y < gs; y++) {
                    const lvl = scene.grid[x][y].item.level;
                    if (x + 1 < gs && scene.grid[x+1][y].item.level === lvl) return;
                    if (y + 1 < gs && scene.grid[x][y+1].item.level === lvl) return;
                }
            }
            showLose(scene);
        }

        function showWin(scene) {
            if (scene.gameOver) return;
            scene.gameOver = true;
            const ov = scene.add.graphics().setDepth(3000);
            ov.fillStyle(0x000000, 0.75); ov.fillRect(0, 0, 600, 800);
            scene.add.text(300, 260, '🏆', { fontSize: '100px' }).setOrigin(0.5).setDepth(3001);
            scene.add.text(300, 390, 'ВЫ ПОБЕДИЛИ!', {
                fontSize: '42px', fontStyle: 'bold', color: '#f9e44a', stroke: '#000', strokeThickness: 5
            }).setOrigin(0.5).setDepth(3001);
            scene.add.text(300, 450, 'Собрано здание 32!', {
                fontSize: '22px', color: '#fff', stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(3001);
            drawResultBtn(scene, 300, 560, 'Играть снова', 0x5da8ff, () => scene.scene.restart());
        }

        function showLose(scene) {
            if (scene.gameOver) return;
            scene.gameOver = true;
            const ov = scene.add.graphics().setDepth(3000);
            ov.fillStyle(0x000000, 0.78); ov.fillRect(0, 0, 600, 800);
            scene.add.text(300, 260, '💥', { fontSize: '100px' }).setOrigin(0.5).setDepth(3001);
            scene.add.text(300, 390, 'ИГРА ОКОНЧЕНА', {
                fontSize: '40px', fontStyle: 'bold', color: '#e06c75', stroke: '#000', strokeThickness: 5
            }).setOrigin(0.5).setDepth(3001);
            scene.add.text(300, 450, 'Нет доступных ходов!', {
                fontSize: '22px', color: '#fff', stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(3001);
            drawResultBtn(scene, 300, 560, 'Попробовать снова', 0x5da8ff, () => scene.scene.restart());
        }

        function drawResultBtn(scene, x, y, label, color, callback) {
            const bw = 280, bh = 68;
            const bg = scene.add.graphics().setDepth(3002);
            bg.fillStyle(color, 1);
            bg.fillRoundedRect(x - bw/2, y - bh/2, bw, bh, 18);
            bg.fillStyle(0xffffff, 0.15);
            bg.fillRoundedRect(x - bw/2 + 6, y - bh/2 + 4, bw - 12, bh/2 - 4, 12);
            scene.add.text(x, y, label, { fontSize: '24px', fontStyle: 'bold', color: '#fff', stroke: '#1a5fa8', strokeThickness: 3 }).setOrigin(0.5).setDepth(3003);
            scene.add.zone(x, y, bw, bh).setInteractive().setDepth(3004).on('pointerup', callback);
        }
    </script>
</body>

</html>
